<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll Form</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <header>
        <h1>WDD 130 | HTML Form - User Poll</h1>
    </header>
    <form>
        <fieldset>
            <legend>Contact Information</legend>
            <div class="form-item column2">
                <label>Full Name: <input type="text" id="fullname" name="fullname" required></label>
            </div>
            <div class="form-item column2">
                <label>Email: <input type="text" id="useremail" name="useremail" required></label>
            </div>

        </fieldset>
        <fieldset>
            <legend>Questions</legend>
            <div class="form-item column1">
                <label>What is your favorite browser? <select name="browser" id="browser">
                        <option value="1">Chrome</option>
                        <option value="2">Safari</option>
                        <option value="3">Edge</option>
                        <option value="4">Other</option>
                    </select></label>
            </div>
            <div class="form-item column1">
                <label>Do you have a household pet? <input type="checkbox" id="pet"
                      name="pet"></label>
            </div>
            <div class="form-item column1">
                <label>List the places you have lived: <textarea name="feedback" id="feedback"
                      rows="4"
                      placeholder="Stillwater Florida, Amsterdam Netherlands, Timbuktu Mali"></textarea></label>
            </div>
            <button type="submit">Submit Poll</button>
        </fieldset>
    </form>
    <footer>©2026 | HTML Form - User Poll Activity | Trevor Schwitters</footer>
</body>

</html>
