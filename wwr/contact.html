<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Water Rafting, Contact Us</title>
    <meta name="description"
      content="Page to contact the White Water Rafting Company with contact information">
    <meta name="author" content="Trevor Schwitters">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/wwr_logo.png" alt="White Water Rafting Company Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <section class="contact">
            <div class="info">
                <h1>White Water Rafting Company</h1>
                <p>123 Main River Street</p>
                <p>Kolob, California</p>
                <p>+1 999 999 9999</p>
                <p>info@whitewater.com</p>
            </div>

            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1340.1560760560249!2d-122.02533802860015!3d36.97527924886243!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x808e4026633df9e3%3A0x7948909fb68b206c!2s123%20River%20St%20S%2C%20Santa%20Cruz%2C%20CA%2095060!5e0!3m2!1sen!2sus!4v1780514517538!5m2!1sen!2sus"
                  width="350" height="350" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <div>
                <form>
                    <div class="form-item single-input">
                        <div><label for="name">Name</label></div>
                        <div><input type="text" id="name" name="name"></div>
                    </div>
                    <div class="form-item single-input">
                        <div><label for="email">Email</label></div>
                        <div><input type="email" id="email" name="email"></div>
                    </div>
                    <div class="form-item radio">
                        <p>Message Purpose</p>
                        <div class="radio-select">
                            <div>
                                <input type="radio" name="purpose" id="1">
                                <label for="1">General Inquiry</label>
                            </div>
                            <div>
                                <input type="radio" name="purpose" id="2">
                                <label for="2">Reservation Question</label>
                            </div>
                            <div>
                                <input type="radio" name="purpose" id="3">
                                <label for="3">Website Suggestion</label>
                            </div>
                        </div>
                    </div>
                    <div class="form-item textbox">
                        <label for="message">Message</label>
                        <textarea name="message" id="message"></textarea>
                    </div>
                    <div class="form-item">
                        <label>Please subscribe me to the monthly newsletter <input type="checkbox"
                              id="subscribe" name="subscribe"></label>
                    </div>
                    <div class="form-item submit">
                        <button type="submit">Get in Touch!</button>
                    </div>
                </form>
            </div>
        </section>

        <section class="multi-image-3">
            <h2>We Are Here to Serve You</h2>
            <figure>
                <img src="images/employee1.jpg" alt="guy with black shirt">
                <figcaption>Manager</figcaption>
            </figure>
            <figure>
                <img src="images/employee2.jpg" alt="guy with purple shirt">
                <figcaption>Customer Support</figcaption>
            </figure>
            <figure>
                <img src="images/employee3.jpg" alt="girl with blue shirt">
                <figcaption>Receptionist</figcaption>
            </figure>
        </section>
    </main>

    <footer>
        <p>©2026 ✖ White Water Rafting Company ✖ Trevor Schwitters</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook-square.svg" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin-square.svg" alt="Linkedin Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram-square.svg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
