<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Water Rafting, index</title>
    <meta name="index"
      content="Main page for the White Water Rafting Company including a newsletter sign up and a call to action link with a link to the trips page.">
    <meta name="author" content="Trevor Schwitters">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/wwr_logo.png" alt="White Water Rafting Company Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <div class="hero">
            <img src="images/hero.jpg" alt="People Rafting">
            <h1>White Water Rafting Company</h1>
            <section class="hero-button">
                <p>Start your Adventure Today!</p>
                <a href="trips.html">
                <button>Trips</button>
                </a>
            </section>
        </div>
        <div>
            <section class="multi-image-3">
                <figure>
                    <img src="images/camp.jpg" alt="Campsite with tent and firepit">
                    <figcaption>Camping</figcaption>
                </figure>
                <figure>
                    <img src="images/river.jpg" alt="a scenic river">
                    <figcaption>Rivers</figcaption>
                </figure>
                <figure>
                    <img src="images/rapids.jpg" alt="people in raft getting splashed">
                    <figcaption>Rapids</figcaption>
                </figure>
            </section>
        </div>
        <form>
            <div class="form-item center">
                <label>Please subscribe to the monthly newsletter</label>
            </div>
            <div class="form-item single-input-index">
                <div><label for="name">Name</label></div>
                <div><input type="text" id="name" name="name"></div>
            </div>
            <div class="form-item single-input-index">
                <div><label for="email">Email</label></div>
                <div><input type="email" id="email" name="email"></div>
            </div>
            <div class="form-item submit">
                <button type="submit">Get in Touch!</button>
            </div>
        </form>
    </main>

    <footer>
        <p>©2026 ✖ White Water Rafting Company ✖ Trevor Schwitters</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook-square.svg" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin-square.svg" alt="Linkedin Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram-square.svg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
